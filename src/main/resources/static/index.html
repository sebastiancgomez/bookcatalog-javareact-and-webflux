<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Book Catalog</h1>

<!-- FILTERS -->
<h3>Filters</h3>

<div class="filters">
    <input type="text" id="filterTitle" placeholder="Title">
    <input type="text" id="filterAuthor" placeholder="Author">

    <label>Published From</label>
    <input type="date" id="filterDateFrom">

    <label>To</label>
    <input type="date" id="filterDateTo">

    <button onclick="fetchBooks()">Apply Filters</button>
    <button onclick="clearFilters()">Clear</button>
</div>


<!-- ADD / UPDATE -->
<h3>Add / Update Book</h3>

<input type="hidden" id="bookId">

<input type="text" id="bookTitle" placeholder="Title">
<input type="text" id="bookAuthor" placeholder="Author">

<input type="number" id="bookPrice" placeholder="Price" step="0.01">

<label>Publish Date</label>
<input type="date" id="bookPublishDate">

<button onclick="saveBook()">Save Book</button>


<!-- TABLE -->
<h3>Books</h3>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Price</th>
        <th>Publish Date</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody id="booksTable"></tbody>

</table>

<script src="app.js"></script>

</body>
</html>
